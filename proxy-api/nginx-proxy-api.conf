server {
    listen 80;
    server_name api.andrewbaker.ninja;
    root /var/www/proxy-api;
    index index.php;

    client_max_body_size 64k;

    # Block direct access to sensitive files
    location ~ ^/(config\.php|data/|\.git) { deny all; return 404; }

    # Route clean paths to PHP files
    location = /checkout      { try_files /checkout.php      =404; fastcgi_pass unix:/run/php/php8.2-fpm.sock; fastcgi_param SCRIPT_FILENAME $document_root/checkout.php;      include fastcgi_params; }
    location = /webhook       { try_files /webhook.php       =404; fastcgi_pass unix:/run/php/php8.2-fpm.sock; fastcgi_param SCRIPT_FILENAME $document_root/webhook.php;       include fastcgi_params; }
    location = /status        { try_files /status.php        =404; fastcgi_pass unix:/run/php/php8.2-fpm.sock; fastcgi_param SCRIPT_FILENAME $document_root/status.php;        include fastcgi_params; }
    location = /billing-portal{ try_files /billing-portal.php=404; fastcgi_pass unix:/run/php/php8.2-fpm.sock; fastcgi_param SCRIPT_FILENAME $document_root/billing-portal.php;include fastcgi_params; }
    location = /manage        { try_files /manage.php        =404; fastcgi_pass unix:/run/php/php8.2-fpm.sock; fastcgi_param SCRIPT_FILENAME $document_root/manage.php;        include fastcgi_params; }
    location = /cancel        { try_files /cancel.php        =404; fastcgi_pass unix:/run/php/php8.2-fpm.sock; fastcgi_param SCRIPT_FILENAME $document_root/cancel.php;        include fastcgi_params; }

    # /v1/messages → index.php
    location = /v1/messages {
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        include fastcgi_params;
    }

    # Default PHP handler
    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }
}
